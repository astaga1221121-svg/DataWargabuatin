name: Sync Weather Data

on:
  schedule:
    # Run every 6 hours (BMKG updates ~2 times a day)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual run

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sync_weather.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add cache/ sampahku/
          git commit -m "Update weather cache and cleanup sampahku [skip ci]" || echo "No changes to commit"
          git push
