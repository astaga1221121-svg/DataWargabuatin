name: BMKG Realtime Sync

on:
  schedule:
    - cron: '0 */3 * * *' # Jalan tiap 3 jam
  workflow_dispatch:

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # Mencari semua file .json di folder data/ kecuali file sistem/pendukung
          # Gunakan find agar lebih akurat di environment Linux
          FILES=$(find data -maxdepth 1 -name "*.json" ! -name "links_api.json" ! -name "hewan_cocok.json" ! -name "sayuran_cocok.json" -exec basename {} \;)
          
          # Ubah ke format JSON array untuk matrix
          JSON_FILES=$(echo "$FILES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          
          echo "Daftar file ditemukan: $JSON_FILES"
          echo "matrix=$JSON_FILES" >> $GITHUB_OUTPUT

  sync:
    needs: generate-matrix
    runs-on: ubuntu-latest
    if: needs.generate-matrix.outputs.matrix != '[]' && needs.generate-matrix.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      max-parallel: 8 # Ditingkatkan sedikit, tetap aman dari rate limit 60/min
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install requests supabase
        
      - name: Run Sync Script
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sync_bmkg_final.py "${{ matrix.file }}"
        
      - name: Commit & Push Changes
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "actions@github.com"
          git add cache/ sampahku/
          # Menggunakan rebase agar tidak konflik saat push dari banyak job paralel
          git commit -m "Auto-update weather: ${{ matrix.file }}" || exit 0
          git pull --rebase origin main
          git push origin main
