name: BMKG Realtime Sync

on:
  schedule:
    - cron: '0 */3 * * *' # Berjalan otomatis setiap 3 jam
  workflow_dispatch: # Memungkinkan dijalankan manual dari tab "Actions" di GitHub

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v3
      - id: set-matrix
        run: |
          # Mencari semua file .json di folder data untuk diproses secara paralel
          FILES=$(ls DataWargabuatin/data/*.json | xargs -n 1 basename | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$FILES" >> $GITHUB_OUTPUT

  sync:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      max-parallel: 15 # Menjalankan 15 provinsi sekaligus agar cepat tapi aman dari rate limit
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install requests supabase
        
      - name: Run Sync Script
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sync_bmkg_final.py "DataWargabuatin/data/${{ matrix.file }}"
        
      - name: Commit & Push Changes (Cache & Trash)
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "actions@github.com"
          git add DataWargabuatin/cache/ DataWargabuatin/sampahku/
          git commit -m "Auto-update weather cache: ${{ matrix.file }}" || exit 0
          git push origin main
