name: BMKG Realtime Sync

on:
  schedule:
    - cron: '0 */3 * * *' # Berjalan otomatis setiap 3 jam
  workflow_dispatch: # Memungkinkan dijalankan manual dari tab "Actions"

permissions:
  contents: write # Memberikan izin untuk push commit kembali ke repo

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # Mencari semua file .json di folder data
          # Kita pastikan hanya mengambil file json wilayah, bukan file script atau lainnya
          # Gunakan find agar lebih tangguh
          FILES=$(find data -maxdepth 1 -name "*.json" ! -name "links_api.json" ! -name "hewan_cocok.json" ! -name "sayuran_cocok.json" -exec basename {} \;)
          JSON_FILES=$(echo "$FILES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$JSON_FILES" >> $GITHUB_OUTPUT

  sync:
    needs: generate-matrix
    runs-on: ubuntu-latest
    if: needs.generate-matrix.outputs.matrix != '[]' && needs.generate-matrix.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      max-parallel: 5 # Membatasi agar tidak terkena rate limit BMKG (60 req/min)
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install requests supabase
        
      - name: Run Sync Script
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sync_bmkg_final.py "${{ matrix.file }}"
        
      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tambahkan perubahan di folder cache dan sampahku
          git add cache/ sampahku/
          
          # Commit jika ada perubahan
          if git commit -m "Auto-update weather cache: ${{ matrix.file }}"; then
            # Gunakan rebase saat pull agar tidak terjadi merge conflict saat push paralel
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
